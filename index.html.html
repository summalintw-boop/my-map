<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <title>全球舞蹈學校地圖 - Ballet in the World</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            height: 100vh; width: 100vw;
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Microsoft JhengHei", sans-serif; 
            overflow: hidden;
        }

        /* 1. 透明奶白色 Banner (Cream White) */
        .top-banner {
            text-align: center; 
            padding: 18px 10px; 
            background-color: rgba(255, 253, 241, 0.95); /* 奶白色 */
            border-bottom: 1px solid #EAEAEA;
            flex-shrink: 0; 
            z-index: 1001;
        }
        .top-banner h1 { margin: 0; color: #000; font-size: 24px; font-weight: 500; letter-spacing: 1px; }
        .top-banner .sub-title { 
            margin: 2px 0 5px 0; color: #333; 
            font-family: 'Times New Roman', Times, serif; 
            font-style: italic; font-size: 1.4em; 
        }
        .top-banner .author { margin: 0; color: #666; font-size: 0.8em; }

        /* 2. 地圖容器 */
        #map { flex-grow: 1; width: 100%; background: #fcfcfc; position: relative; }

        /* 3. 右側搜尋面板 */
        .search-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9); /* 透明白 */
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            width: 280px;
            display: flex;
            flex-direction: column;
            max-height: 75vh;
        }
        .search-inner { display: flex; gap: 8px; margin-bottom: 10px; }
        #search-input {
            flex-grow: 1;
            padding: 8px 12px;
            border: 1px solid #DDD;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }
        /* 前一版的粉紅色按鈕配置 */
        .btn-pink {
            padding: 8px 12px;
            background-color: #FFD1DC; 
            color: #D87093; 
            border: 1px solid #FFC0CB;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        #search-results {
            overflow-y: auto;
            border-top: 1px solid #EEE;
            display: none;
        }
        .result-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #F5F5F5;
        }
        .result-item:hover { background-color: #FFF5F7; }
        .result-item.active { border-left: 4px solid #DB7093; background-color: #FFF5F7; }
        .result-item strong { display: block; font-size: 14px; color: #000; font-weight: 500; }
        .result-item span { font-size: 12px; color: #D87093; }

        /* 4. Popup 資訊框：優化字體與間距 */
        .info-box { 
            color: #000; 
            line-height: 1.5; 
            min-width: 240px; 
            padding: 2px;
            font-weight: 300; /* 使用細體避免糊在一起 */
        }
        .tag { 
            display: inline-block; padding: 1px 9px; border-radius: 10px; 
            font-size: 10px; margin-bottom: 6px; font-weight: 600; 
        }
        .tag-univ { background: #E3F2FD; color: #1565C0; } 
        .tag-acad { background: #FCE4EC; color: #C2185B; } 
        
        .info-box strong.school-name {
            display: block; 
            font-size: 17px; 
            margin: 4px 0; 
            color: #000; 
            font-weight: 600; /* 標題稍微粗一點，內容細一點 */
        }
        .info-detail { font-size: 13px; margin-top: 8px; }
        .info-detail b { font-weight: 500; color: #000; } /* 標籤黑色 */
        .info-detail span { color: #444; }

        /* 前一版粉紅色的 Visit Website 按鈕 */
        .btn-link { 
            display: block; margin-top: 12px; padding: 9px; 
            background-color: #FFD1DC; 
            color: #D87093; 
            text-decoration: none; 
            border-radius: 6px; font-weight: bold; text-align: center; font-size: 13px;
            border: 1px solid #FFC0CB;
            transition: 0.2s;
        }
        .btn-link:hover { background-color: #FFC0CB; }

        .legend {
            position: absolute; bottom: 30px; left: 20px; z-index: 1000;
            background: rgba(255,255,255,0.9); padding: 10px; border-radius: 8px;
            font-size: 12px; box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        @media (max-width: 600px) {
            .search-container { width: calc(100% - 40px); right: 20px; }
        }
    </style>
</head>
<body>

    <header class="top-banner">
        <h1>世界芭蕾舞學校分布</h1>
        <div class="sub-title">Ballet in the World</div>
        <p class="author">製作者：Cheng, Yun-Rong & Lin, Sheng-Chi</p>
    </header>

    <div id="map">
        <div class="search-container">
            <div class="search-inner">
                <input type="text" id="search-input" placeholder="搜尋學校或國家..." oninput="liveSearch()">
                <button class="btn-pink" onclick="clearSearch()">清除</button>
            </div>
            <div id="search-results"></div>
        </div>
        
        <div class="legend">
            <div style="margin-bottom:4px;"><span style="color: #FFB6C1;">●</span> 芭蕾舞學校</div>
            <div><span style="color: #ADD8E6;">●</span> 大學舞蹈系</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', { zoomControl: false }).setView([20, 0], 2);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        var allMarkers = []; 
        var csvUrl = "https://gist.githubusercontent.com/summalintw-boop/1ad7aba56beff6580117687628213ca7/raw/balletschool.csv?t=" + new Date().getTime();

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);

        function getIcon(type) {
            var isUniv = (type && type.includes("University"));
            var bgColor = isUniv ? "#ADD8E6" : "#FFB6C1"; 
            var borderColor = isUniv ? "#4682B4" : "#FF69B4"; 
            var size = 11;
            return L.divIcon({
                className: 'custom-dot',
                html: `<div style="background-color: ${bgColor}; width: ${size}px; height: ${size}px; border-radius: 50%; border: 1.8px solid ${borderColor}; box-shadow: 0 0 2px rgba(0,0,0,0.2);"></div>`,
                iconSize: [size, size], iconAnchor: [size/2, size/2], popupAnchor: [0, -size/2]
            });
        }

        Papa.parse(csvUrl, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                results.data.forEach(function(school) {
                    var coordsRaw = school["Latitude & Longitude (decimal format)"];
                    if (coordsRaw) {
                        var parts = coordsRaw.split(',');
                        var lat = parseFloat(parts[0]);
                        var lng = parseFloat(parts[1]);
                        if (!isNaN(lat) && !isNaN(lng)) {
                            var type = school["Type"] || "";
                            var marker = L.marker([lat, lng], {icon: getIcon(type)}).addTo(map);
                            
                            allMarkers.push({
                                name: school["School Name"] || "Unknown",
                                country: school["Country"] || "",
                                marker: marker
                            });

                            var isUniv = type.includes("University");
                            var tagClass = isUniv ? "tag-univ" : "tag-acad";

                            marker.bindPopup(`
                                <div class="info-box">
                                    <span class="tag ${tagClass}">${type}</span>
                                    <strong class="school-name">${school["School Name"]}</strong>
                                    <div style="font-size:12px; color:#555;">📍 ${school.City}, ${school.Country}</div>
                                    <hr style="margin:10px 0; border:0; border-top:1px solid #EEE;">
                                    <div class="info-detail">
                                        <b>隸屬:</b> <span>${school["Affiliation"] || "--"}</span><br>
                                        <b>年紀:</b> <span>${school["Enrollment Age"] || "--"}</span><br>
                                        <b>學費:</b> <span>${school["Annual Tuition (Local)"] || "--"}</span><br>
                                        <b>宿舍/獎學金:</b> <span>${school["Boarding"] || "--"} / ${school["Scholarship"] || "--"}</span>
                                    </div>
                                    <a href="${school["Website"]}" target="_blank" class="btn-link">前往官網 Visit Website ➔</a>
                                </div>
                            `);
                        }
                    }
                });
            }
        });

        function liveSearch() {
            var query = document.getElementById('search-input').value.toLowerCase().trim();
            var resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = ''; 

            if (query.length < 1) {
                resultsDiv.style.display = 'none';
                return;
            }

            var matches = allMarkers.filter(function(item) {
                return item.name.toLowerCase().includes(query) || item.country.toLowerCase().includes(query);
            });

            if (matches.length > 0) {
                resultsDiv.style.display = 'block';
                matches.forEach(function(item) {
                    var div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `<strong>${item.name}</strong><span>📍 ${item.country}</span>`;
                    
                    div.onclick = function() {
                        document.querySelectorAll('.result-item').forEach(el => el.classList.remove('active'));
                        div.classList.add('active');
                        map.flyTo(item.marker.getLatLng(), 15, { duration: 1.5 });
                        map.once('moveend', function() {
                            item.marker.openPopup();
                        });
                    };
                    resultsDiv.appendChild(div);
                });
            } else {
                resultsDiv.style.display = 'none';
            }
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            var resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = '';
            resultsDiv.style.display = 'none';
            map.flyTo([20, 0], 2);
        }

        map.on('zoomend', function() {
            var z = map.getZoom();
            var newSize = z <= 3 ? 8 : (z <= 6 ? 11 : 18);
            document.querySelectorAll('.custom-dot').forEach(function(dot) {
                dot.style.width = newSize + 'px'; dot.style.height = newSize + 'px';
            });
        });
    </script>
</body>
</html>
